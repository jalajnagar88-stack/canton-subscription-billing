name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  daml:
    name: Daml Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Daml SDK
        run: |
          curl -sSL https://get.daml.com/ | sh -s 3.1.0
          echo "$HOME/.daml/bin" >> $GITHUB_PATH

      - name: Verify Daml installation
        run: daml --version

      - name: Build Daml project
        run: daml build -o canton-subscription-billing.dar

      - name: Run Daml tests
        run: daml test

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build frontend
        run: npm run build