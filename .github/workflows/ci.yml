name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install DPM
        run: curl https://get.digitalasset.com/install/install.sh | sh

      - name: Add DPM to PATH
        run: echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Cache DPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/.dpm/packages
          key: ${{ runner.os }}-dpm-${{ hashFiles('**/daml.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dpm-

      - name: Build Daml model
        run: dpm build

      - name: Run Daml tests
        run: dpm test